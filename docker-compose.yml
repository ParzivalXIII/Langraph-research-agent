version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: research-agent
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./research_agent.db
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_ID=${OPENROUTER_MODEL_ID}
      - LOG_LEVEL=INFO
      - ENABLE_PERSISTENCE=false
      - ENABLE_CACHING=false
    networks:
      - app-network
    volumes:
      - .:/app
      - research_data:/app/data

volumes:
  research_data:

networks:
  app-network:
    driver: bridge
