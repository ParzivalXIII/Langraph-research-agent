version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: research-agent
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://research_user:research_password@db:5432/research_agent
      - REDIS_URL=redis://redis:6379/0
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_ID=${OPENROUTER_MODEL_ID}
      - LOG_LEVEL=INFO
      - ENABLE_PERSISTENCE=false
      - ENABLE_CACHING=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    container_name: research-agent-db
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: research_user
      POSTGRES_PASSWORD: research_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research_user -d research_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: research-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
