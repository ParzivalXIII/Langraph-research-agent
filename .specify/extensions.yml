installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_implement:
  - extension: ship
    command: speckit.ship.run
    enabled: true
    optional: true
    prompt: Ship this feature?
    description: Runs pre-flight checks, syncs branches, generates changelog, and
      creates PR
    condition: null
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  after_specify:
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    prompt: Check artifact sync status after specification?
    description: Show sync status after spec generation
    condition: null
  after_plan:
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    prompt: Check artifact sync status after planning?
    description: Show sync status after plan generation
    condition: null
